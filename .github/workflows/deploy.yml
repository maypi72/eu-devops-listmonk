name: "deploy"

on:
  push:
    branches:
      - main

jobs:
  install:
    name: Desplegar k3s en self-hosted
    runs-on: [self-hosted,linux]

    steps:
      - name: "Comprobar que la acción se está ejecutando en un runner válido"
        run: |
          echo "Runner: $RUNNER_NAME"  # información útil para debugging

      - name: "Verificar privilegios del runner"
        run: |
          if [ "$(id -u)" -eq 0 ]; then
            echo "runner ejecutándose como root"
          elif command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            echo "sudo no pide contraseña"
          else
            echo "::error::El usuario del runner debe tener sudo NOPASSWD o el runner debe ejecutarse como root"
            echo "::error::Solución: crear /etc/sudoers.d/github-runner con 'USUARIO ALL=(ALL) NOPASSWD: ALL'"
            exit 1
          fi

      - name: "Checkout del repositorio"
        uses: actions/checkout@v3

      # verificar existencia del script antes de intentar ejecutarlo
      - name: "Verificar script de instalación de k3s"
        run: |
          test -f infra/scripts/install_k3s.sh || { echo "::error::Falta infra/scripts/install_k3s.sh"; exit 1; }
          if [ ! -x infra/scripts/install_k3s.sh ]; then
            echo "infra/scripts/install_k3s.sh no es ejecutable, ajustando permisos..."
            chmod +x infra/scripts/install_k3s.sh
          fi

      - name: "Ejecutar instalador de k3s"
        env:
          # variables opcionales que puedes ajustar desde el workflow o desde secrets
          K3S_CHANNEL: stable
        run: infra/scripts/install_k3s.sh

      - name: "Verificar script de instalación de ingress"
        run: |
          test -f infra/scripts/install_ingress.sh || { echo "::error::Falta infra/scripts/install_ingress.sh"; exit 1; }
          if [ ! -x infra/scripts/install_ingress.sh ]; then
            echo "infra/scripts/install_ingress.sh no es ejecutable, ajustando permisos..."
            chmod +x infra/scripts/install_ingress.sh
          fi

      - name: "Ejecutar instalador de ingress"
        run: infra/scripts/install_ingress.sh

      - name: "Verificar script de instalación de cert-manager"
        run: |
          test -f infra/scripts/install_cert_manager.sh || { echo "::error::Falta infra/scripts/install_cert_manager.sh"; exit 1; }
          if [ ! -x infra/scripts/install_cert_manager.sh ]; then
            echo "infra/scripts/install_cert_manager.sh no es ejecutable, ajustando permisos..."
            chmod +x infra/scripts/install_cert_manager.sh
          fi

      - name: "Ejecutar instalador de cert-manager"
        env:
          APP_NAMESPACE: listmonk
          LOCAL_DOMAIN: listmonk.local
          TLS_SECRET_NAME: listmonk-local-tls
        run: infra/scripts/install_cert_manager.sh

      - name: "Verificar script de instalación de LocalStack"
        run: |
          test -f infra/scripts/install_localstack.sh || { echo "::error::Falta infra/scripts/install_localstack.sh"; exit 1; }
          if [ ! -x infra/scripts/install_localstack.sh ]; then
            echo "infra/scripts/install_localstack.sh no es ejecutable, ajustando permisos..."
            chmod +x infra/scripts/install_localstack.sh
          fi

      - name: "Ejecutar instalador de LocalStack"
        env:
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRETE_KEY: ${{ secrets.AWS_SECRETE_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          LOCALSTACK_NODEPORT: "31566"
        run: infra/scripts/install_localstack.sh
